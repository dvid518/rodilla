<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Panel | Rodilla</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body class="panel light">
    <div class="block-menu">
        <section class="menu-fullscreen glass" id="menu">
            <button class="exis item" onclick="hideMenu()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 8L8 16M8.00001 8L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <a href="index.html" class="nav-logo item">Rodilla</a>
            <div class="menu-list">
                <a class="item a" id="index-i" href="#">Productos</a>
                <a class="item a" id="menu-i" href="#">Reservas</a>
                <a class="item a" id="nosotros-i" href="#">Mensajes</a>
                <a class="item a" id="contacto-i" href="#">Usuarios</a>
                <button class="logout-btn">Cerrar Sesión</button>
            </div>
        </section>
        <header class="navbar glass">
                <a href="index.html" class="nav-logo item">Rodilla</a>
                <nav class="nav-menu">
                        <a class="item" href="#">Productos</a>
                        <a class="item" href="#">Reservas</a>
                        <a class="item" href="#">Mensajes</a>
                        <a class="item" href="#">Usuarios</a>
                </nav>
                <button class="logout-btn">Cerrar Sesión</button>
                <button class="menu-toggle item" id="menu-toggle" onclick="showMenu()">
                    <svg width="38px" height="38px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="Menu / Menu_Alt_05">
                            <path id="Vector" d="M5 17H13M5 12H19M11 7H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                    </svg>
                </button>
        </header>
    </div>
    <section class="bienvenida">
            <h1>Bienvenido @david</h1>
            <h2>Tienes acceso a todas las funciones</h2>
    </section>
    <script src="js/script.js"></script>
    <script src="js/panel.js"></script>
</body>
</html>
