<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Rodilla | Cafetería de especialidad</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body class="light">
    <header class="navbar glass">
            <a href="index.html" class="nav-logo alt-item">Rodilla</a>
            <nav class="nav-menu">
                    <a class="alt-item" href="index.html">Inicio</a>
                    <a class="alt-item" href="menu.html">Menú</a>
                    <a class="alt-item" href="nosotros.html">Nosotros</a>
                    <a class="alt-item" href="contacto.html">Contacto</a>
            </nav>
            <div class="alt-btn"><a href="reserva.html">Reservar ahora</a></div>   
    </header>
    <section class="contacto">
        <h1>Ponte en contacto con nosotros</h1>
        <form action="">
            <div class="formulario">
                <input type="text" id="nombre" name="nombre" autocomplete="name" class="glass" placeholder="Nombre *" required>
                <input type="email" id="mail" name="mail" autocomplete="email" class="glass" placeholder="Correo *" required>
                <textarea id="mensaje" name="mensaje" autocomplete="off" class="glass" placeholder="Mensaje..."></textarea>
                <p class="nota">Obligatorios todos los campos con *</p>
            </div>
            <div class="submit">
                <label>
                    <input type="checkbox" id="checkbox" required>
                    Acepto el tratamiento de mi información.
                </label>
                <button type="submit" class="glass">Enviar</button>
            </div>
        </form>
    </section>
    <footer>
        <div class="alt-copy glass">&copy; 2026 Rodilla</div>
    </footer>
</body>
