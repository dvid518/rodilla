<body class="dark" style="overflow: hidden;">
    <div class="block-menu">
        <section class="menu-fullscreen glass" id="menu">
            <button class="exis item" onclick="hideMenu()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 8L8 16M8.00001 8L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <a href="index.html" class="nav-logo item">Rodilla</a>
            <div class="menu-list">
                <a class="item" href="index.html">Inicio</a>
                <a class="item" href="menu.html">Menú</a>
                <a class="item" href="nosotros.html">Nosotros</a>
                <a class="item" href="contacto.html">Contacto</a>
                <div class="btn active"><a href="reserva.html">Reservar ahora</a></div>
            </div>
        </section>
        <header class="navbar glass">
                <a href="index.html" class="nav-logo item">Rodilla</a>
                <nav class="nav-menu">
                        <a class="item"href="index.html">Inicio</a>
                        <a class="item"href="menu.html">Menú</a>
                        <a class="item"href="nosotros.html">Nosotros</a>
                        <a class="item"href="contacto.html">Contacto</a>
                </nav>
                <div class="btn"><a href="reserva.html">Reservar ahora</a></div>
                <button class="menu-toggle item" id="menu-toggle" onclick="showMenu()">
                    <svg width="38px" height="38px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="Menu / Menu_Alt_05">
                            <path id="Vector" d="M5 17H13M5 12H19M11 7H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                    </svg>
                </button>
        </header>
    <section class="contacto">
        <h1>Ponte en contacto con nosotros</h1>
        <form action="">
            <div class="formulario">
                <input type="text" id="nombre" name="nombre" autocomplete="name" class="glass" placeholder="Nombre *" required>
                <input type="email" id="mail" name="mail" autocomplete="email" class="glass" placeholder="Correo *" required>
                <textarea id="mensaje" name="mensaje" autocomplete="off" class="glass" placeholder="Mensaje..."></textarea>
                <p class="nota">Obligatorios todos los campos con *</p>
            </div>
            <div class="submit">
                <label>
                    <input type="checkbox" id="checkbox" required>
                    Acepto el tratamiento de mi información.
                </label>
                <button type="submit" class="glass">Enviar</button>
            </div>
        </form>
    </section>
    <footer>
        <div class="copy glass">&copy; 2026 Rodilla</div>
        <a href="https://facebook.com" target="_blank">
            <button class="footer-btn glass" id="facebook">
