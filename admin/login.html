<section class="block-login">
    <h1>Iniciar Sesión</h1>
    <div class="ipt">
        <input class="glass" type="text" placeholder="Usuario" id="user" name="user" required>
        <input class="glass" type="password" placeholder="Contraseña" id="pass" name="pass" required>
    </div>
    <div class="error" id="msg"></div>
    <div class="btns">
        <button class="glass" onclick="backIndex()">Regresar a Inicio</button>
        <button class="glass" onclick="login()">Iniciar Sesión</button>
    </div>
</section>
