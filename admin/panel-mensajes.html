<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Panel | Rodilla</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/panel.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body class="panel light">
    <div class="block-menu">
        <section class="menu-fullscreen glass" id="menu">
            <button class="exis item" onclick="hideMenu()">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 8L8 16M8.00001 8L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <a href="index.html" class="nav-logo item">Rodilla</a>
            <div class="menu-list">
                <a class="item" href="panel-carta.html" name="carta">Carta</a>
                <a class="item" href="panel-reservas.html" name="reservas">Reservas</a>
                <a class="item" href="panel-mensajes.html" name="mensajes">Mensajes</a>
                <a href="../index.html">
                    <button class="logout-btn">
                        Cerrar Sesión
                    </button>
                </a>
            </div>
        </section>
        <header class="navbar glass">
                <a href="index.html" class="nav-logo item">Rodilla</a>
                <nav class="nav-menu">
                        <a class="item" href="panel-carta.html" name="carta">Carta</a>
                        <a class="item" href="panel-reservas.html" name="reservas">Reservas</a>
                        <a class="item" href="panel-mensajes.html" name="mensajes">Mensajes</a>
                </nav>
                <a href="../index.html">
                    <button class="logout-btn">
                        Cerrar Sesión
                    </button>
                </a>
                <button class="menu-toggle item" id="menu-toggle" onclick="showMenu()">
                    <svg width="38px" height="38px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="Menu / Menu_Alt_05">
                            <path id="Vector" d="M5 17H13M5 12H19M11 7H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                    </svg>
                </button>
        </header>
    </div>
    <section class="mensajes" id="mensajes-section">
        <div class="tabla-container glass">
            <div class="tabla-block tab-mensajes act" id="tabla-bebidas">
                <table>
                    <thead>
                        <tr>
                            <th>id_mensaje</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Mensaje</th>
                            <th class="del">(D)</th>
                        </tr>
                    </thead>
                    <tbody id="mensajes-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="form-add-producto" id="form-add-producto">
            <div class="left">
                <div class="title" id="title"></div>
                <input type="text" id="nombre" placeholder="Nombre" autocomplete="off">
                <input type="number" step="0.01" id="precio" placeholder="Precio">
                <input type="text" id="img" placeholder="Link de la imagen">
                <select id="categoria">
                    <option value="" disabled selected>Categoría</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="postres">Postres</option>
                    <option value="aperitivos">Aperitivos</option>
                </select>
                <div class="button-container">
                    <button id="push"></button>
                    <button id="del" class="hide-btn">Eliminar</button>
                    <button id="exit">Salir</button>
                </div>
            </div>
            <div class="right">
                <div class="img-box" id="img-box">
                </div>
            </div>
        </div>
    </section>
    <div class="modal-overlay glass" id="deleteModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Confirmar eliminación</h2>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 8L8 16M8.00001 8L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p>¿Estás seguro de que deseas eliminar este producto?</p>
                <div class="product-info" id="productInfo">
                    <span id="productName"></span>
                    <span id="productCategory"></span>
                </div>
                <p class="warning-text">Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" id="modalCancel">Cancelar</button>
                <button class="delete-btn" id="modalConfirm">Eliminar</button>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
    <script type="module" src="../js/panel-mensajes.js"></script>
</body>
</html>
