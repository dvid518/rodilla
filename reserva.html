<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='UTF-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Rodilla | Cafetería de especialidad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body class="light">
    <header class="navbar glass">
            <a href="index.html" class="nav-logo alt-item">Rodilla</a>
            <nav class="nav-menu">
                    <a class="alt-item" href="index.html">Inicio</a>
                    <a class="alt-item" href="menu.html">Menú</a>
                    <a class="alt-item" href="nosotros.html">Nosotros</a>
                    <a class="alt-item" href="contacto.html">Contacto</a>
            </nav>
            <div class="alt-btn"><a href="reserva.html">Reservar ahora</a></div>   
    </header>
    <section class="reserva">
        <h1 class="alt-text">Elija la cantidad de personas</h1>
        <div class="personas">
            <button class="glass">1</button>
            <button class="glass">2</button>
            <button class="glass">3</button>
            <button class="glass">4</button>
            <button class="glass">5</button>
            <button class="glass">6</button>
            <input class="glass" type="number" placeholder="+">
        </div>
    <p class="nota alt-text">Bebés y niños deben ser incluidos en la cantidad de personas.</p>
    </section>
    <div class="fases glass">
        <div class="fase act" id="fase-personas">
            <span>Personas</span>
        </div>
        <div class="fase" id="fase-fecha">
            <span>Fecha</span>
        </div>

        <div class="fase" id="fase-hora">
            <span>Hora</span>
        </div>

        <div class="fase" id="fase-zona">
            <span>Consumo</span>
        </div>
        <div class="fase">
            <span>Datos</span>
        </div>
    </div>
    <footer>
        <div class="alt-copy glass">&copy; 2026 Rodilla</div>
    </footer>
</body>
</html>
